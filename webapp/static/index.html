<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ib-trading 观测面板</title>
<style>
  :root { --bg:#111418; --card:#1a1f26; --border:#2a323d; --text:#e6e9ed; --muted:#8b95a3;
          --green:#2fbf71; --red:#e05252; --amber:#e0a52e; --blue:#4a90d9; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.6 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif; }
  header { padding:14px 24px; border-bottom:1px solid var(--border); display:flex; gap:16px; align-items:center; flex-wrap:wrap;}
  header h1 { font-size:18px; margin:0; font-weight:600; }
  .pill { padding:2px 10px; border-radius:12px; font-size:12px; border:1px solid var(--border); }
  .ok { color:var(--green); border-color:var(--green); }
  .bad { color:var(--red); border-color:var(--red); }
  nav { display:flex; gap:4px; padding:10px 24px 0; border-bottom:1px solid var(--border); }
  nav button { background:none; border:none; color:var(--muted); padding:8px 14px; cursor:pointer; font-size:14px;
               border-bottom:2px solid transparent; }
  nav button.active { color:var(--text); border-bottom-color:var(--blue); }
  main { padding:20px 24px; max-width:1200px; margin:0 auto; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px 16px; }
  .card .k { color:var(--muted); font-size:12px; }
  .card .v { font-size:22px; font-weight:600; margin-top:2px; }
  table { width:100%; border-collapse:collapse; background:var(--card); border-radius:8px; overflow:hidden; font-size:13px; }
  th, td { padding:7px 12px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
  th { color:var(--muted); font-weight:500; background:#161b22; position:sticky; top:0; }
  .pos { color:var(--green); } .neg { color:var(--red); }
  .section { display:none; } .section.active { display:block; }
  .chartbox { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:20px; height:300px; }
  h3 { font-size:15px; margin:18px 0 8px; color:var(--muted); font-weight:500; }
  .scroll { max-height:480px; overflow:auto; border-radius:8px; }
</style>
</head>
<body>
<header>
  <h1>ib-trading 观测面板</h1>
  <span class="pill" id="mode">…</span>
  <span class="pill" id="gw">网关…</span>
  <span class="pill" id="clock">…</span>
</header>
<nav>
  <button data-s="overview" class="active">总览</button>
  <button data-s="lots">持仓与挂单</button>
  <button data-s="history">全年历史</button>
  <button data-s="runs">每晚决策</button>
  <button data-s="events">事件日志</button>
</nav>
<main>
  <section id="overview" class="section active">
    <div class="cards" id="ov-cards"></div>
    <h3>当前 lot 状态</h3>
    <div class="scroll"><table id="ov-lots"></table></div>
    <h3>今日/下一交易日事件表 <span id="ov-day" style="color:var(--muted)"></span></h3>
    <div class="scroll"><table id="ov-sched"></table></div>
  </section>
  <section id="lots" class="section">
    <div class="scroll"><table id="t-lots"></table></div>
  </section>
  <section id="history" class="section">
    <div class="cards" id="h-cards"></div>
    <div class="chartbox"><canvas id="h-chart"></canvas></div>
    <div class="scroll"><table id="t-history"></table></div>
  </section>
  <section id="runs" class="section">
    <div class="scroll"><table id="t-runs"></table></div>
  </section>
  <section id="events" class="section">
    <div class="scroll"><table id="t-events"></table></div>
  </section>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const $ = s => document.querySelector(s);
const fmt$ = v => (v==null?'—':(v<0?'-':'')+'$'+Math.abs(Math.round(v)).toLocaleString());
const cls = v => v>0?'pos':(v<0?'neg':'');
function table(el, rows, cols) {
  if (!rows.length) { el.innerHTML = '<tr><td style="color:var(--muted)">暂无数据</td></tr>'; return; }
  const head = '<tr>'+cols.map(c=>'<th>'+c[1]+'</th>').join('')+'</tr>';
  const body = rows.map(r=>'<tr>'+cols.map(c=>{
    let v = r[c[0]];
    if (c[2]==='$') return `<td class="${cls(v)}">${fmt$(v)}</td>`;
    return '<td>'+(v==null?'—':v)+'</td>';
  }).join('')+'</tr>').join('');
  el.innerHTML = head+body;
}
async function j(u){ return (await fetch(u)).json(); }

async function loadOverview(){
  const o = await j('/api/overview');
  $('#mode').textContent = 'mode: '+o.mode;
  $('#mode').className = 'pill '+(o.mode==='live'?'ok':'');
  $('#gw').textContent = o.gateway_ok?'网关正常':'网关无响应';
  $('#gw').className = 'pill '+(o.gateway_ok?'ok':'bad');
  $('#clock').textContent = o.now_et;
  const s = o.snapshot||{}, r = o.last_run||{};
  $('#ov-cards').innerHTML = [
    ['净值', s.netliq!=null?fmt$(s.netliq):'—'],
    ['持仓市值', s.gross!=null?fmt$(s.gross):'—'],
    ['可用资金', s.available!=null?fmt$(s.available):'—'],
    ['未平 lot', o.open_lots.length],
    ['最近闸门', r.date? (r.date+' '+(r.gate_pass?'放行':'拦截')) :'—'],
    ['闸门参数', 'VIX≥'+o.gate_cfg.vix_min+' 或 SPY≤'+o.gate_cfg.spy_max_pct+'%'],
  ].map(c=>`<div class="card"><div class="k">${c[0]}</div><div class="v">${c[1]}</div></div>`).join('');
  table($('#ov-lots'), o.open_lots, [['lot_id','ID'],['symbol','代码'],['entry_date','入场日'],['qty','数量'],
    ['entry_price','成本'],['target_price','目标价'],['state','状态']]);
  $('#ov-day').textContent = '('+o.target_day+')';
  table($('#ov-sched'), o.schedule, [['ts','时间'],['name','动作']]);
}
async function loadLots(){ table($('#t-lots'), await j('/api/lots'), [['lot_id','ID'],['symbol','代码'],
  ['entry_date','入场'],['qty','数量'],['entry_price','成本'],['target_price','目标'],['state','状态'],
  ['exit_date','出场日'],['exit_price','出场价'],['exit_how','方式'],['pnl','盈亏','$']]); }
async function loadHistory(){
  const sum = await j('/api/history/summary');
  $('#h-cards').innerHTML = sum.by_bucket.map(b=>
    `<div class="card"><div class="k">${b.bucket}（${b.n} 笔，胜率 ${b.win_rate}%）</div>
     <div class="v ${cls(b.pnl)}">${fmt$(b.pnl)}</div></div>`).join('')||'<div class="card">尚未导入历史</div>';
  if (sum.by_month.length && !window._hc) {
    let cum=0; const data = sum.by_month.map(m=>({x:m.ym, y:(cum+=m.pnl)}));
    window._hc = new Chart($('#h-chart'), {type:'line', data:{datasets:[{label:'累计已实现',
      data, borderColor:'#4a90d9', borderWidth:2, pointRadius:2, tension:.2}]},
      options:{responsive:true, maintainAspectRatio:false, parsing:{xAxisKey:'x', yAxisKey:'y'},
      plugins:{legend:{labels:{color:'#8b95a3'}}},
      scales:{x:{type:'category', ticks:{color:'#8b95a3'}, grid:{color:'#2a323d'}},
              y:{ticks:{color:'#8b95a3', callback:v=>'$'+v}, grid:{color:'#2a323d'}}}}});
  }
  table($('#t-history'), await j('/api/history'), [['symbol','代码'],['entry_date','入场'],['last_date','出场'],
    ['hold_td','持有日'],['bucket','类别'],['pnl','盈亏','$']]);
}
async function loadRuns(){ table($('#t-runs'), await j('/api/runs'), [['date','日期'],
  ['gate_pass','放行'],['vix','VIX'],['spy_pct','SPY%'],['n_planned','计划数'],['budget','预算'],['note','备注']]); }
async function loadEvents(){ table($('#t-events'), await j('/api/events'), [['ts','时间'],['kind','类型'],['detail','详情']]); }

const loaders = {overview:loadOverview, lots:loadLots, history:loadHistory, runs:loadRuns, events:loadEvents};
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); $('#'+b.dataset.s).classList.add('active');
  loaders[b.dataset.s]();
});
loadOverview();
setInterval(()=>{ const cur=document.querySelector('nav button.active').dataset.s; loaders[cur](); }, 60000);
</script>
</body>
</html>
