<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ib-trading 观测面板</title>
<style>
  :root { --bg:#111418; --card:#1a1f26; --border:#2a323d; --text:#e6e9ed; --muted:#8b95a3;
          --green:#2fbf71; --red:#e05252; --amber:#e0a52e; --blue:#4a90d9; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.6 -apple-system,"Segoe UI","Microsoft YaHei",sans-serif; }
  header { padding:12px 24px; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center; flex-wrap:wrap;}
  header h1 { font-size:18px; margin:0 12px 0 0; font-weight:600; }
  .pill { padding:2px 10px; border-radius:12px; font-size:12px; border:1px solid var(--border); }
  .ok { color:var(--green); border-color:var(--green); }
  .bad { color:var(--red); border-color:var(--red); }
  .warn { color:var(--amber); border-color:var(--amber); }
  nav { display:flex; gap:4px; padding:10px 24px 0; border-bottom:1px solid var(--border); overflow-x:auto; }
  nav button { background:none; border:none; color:var(--muted); padding:8px 14px; cursor:pointer; font-size:14px;
               border-bottom:2px solid transparent; white-space:nowrap; }
  nav button.active { color:var(--text); border-bottom-color:var(--blue); }
  main { padding:20px 24px; max-width:1240px; margin:0 auto; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(165px,1fr)); gap:12px; margin-bottom:18px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px 16px; }
  .card .k { color:var(--muted); font-size:12px; }
  .card .v { font-size:21px; font-weight:600; margin-top:2px; }
  .card .s { font-size:12px; color:var(--muted); margin-top:2px; }
  table { width:100%; border-collapse:collapse; background:var(--card); border-radius:8px; overflow:hidden; font-size:13px; }
  th, td { padding:7px 12px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
  th { color:var(--muted); font-weight:500; background:#161b22; position:sticky; top:0; }
  .pos { color:var(--green); } .neg { color:var(--red); }
  .section { display:none; } .section.active { display:block; }
  .chartbox { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:18px; height:280px; }
  h3 { font-size:15px; margin:18px 0 8px; color:var(--muted); font-weight:500; }
  .scroll { max-height:480px; overflow:auto; border-radius:8px; }
  .btn { background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:6px;
         padding:6px 14px; cursor:pointer; font-size:13px; }
  .btn.danger { border-color:var(--red); color:var(--red); }
  .btn.safe { border-color:var(--green); color:var(--green); }
  .filters { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .filters .btn.on { border-color:var(--blue); color:var(--blue); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:800px){ .grid2{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>ib-trading</h1>
  <span class="pill" id="mode">…</span>
  <span class="pill" id="gw">网关…</span>
  <span class="pill" id="gatepill">闸门…</span>
  <span class="pill" id="clock">…</span>
  <span class="pill" id="countdown">…</span>
  <span style="flex:1"></span>
  <button class="btn" id="pauseBtn">…</button>
</header>
<div id="banner" style="display:none; background:#2a2410; color:var(--amber); padding:6px 24px; font-size:13px; border-bottom:1px solid var(--border);"></div>
<nav>
  <button data-s="overview" class="active">总览</button>
  <button data-s="lots">交易台账</button>
  <button data-s="history">全年历史</button>
  <button data-s="runs">每晚决策</button>
  <button data-s="events">事件日志</button>
  <button data-s="manual" style="color:var(--amber)">手动操作</button>
</nav>
<main>
  <section id="overview" class="section active">
    <div class="cards" id="ov-cards"></div>
    <div class="grid2">
      <div>
        <h3>持仓（延迟报价）</h3>
        <div class="scroll"><table id="ov-lots"></table></div>
      </div>
      <div>
        <h3>净值曲线（每日快照）</h3>
        <div class="chartbox" style="height:240px"><canvas id="eq-chart"></canvas></div>
        <h3>事件表 <span id="ov-day" style="color:var(--muted)"></span></h3>
        <div class="scroll" style="max-height:220px"><table id="ov-sched"></table></div>
      </div>
    </div>
  </section>
  <section id="lots" class="section">
    <div class="cards" id="l-cards"></div>
    <div class="filters" id="l-filters"></div>
    <div class="scroll"><table id="t-lots"></table></div>
  </section>
  <section id="history" class="section">
    <div class="cards" id="h-cards"></div>
    <div class="grid2">
      <div class="chartbox"><canvas id="h-chart"></canvas></div>
      <div class="chartbox"><canvas id="h-month"></canvas></div>
    </div>
    <div class="scroll"><table id="t-history"></table></div>
  </section>
  <section id="runs" class="section">
    <div class="scroll"><table id="t-runs"></table></div>
  </section>
  <section id="events" class="section">
    <div class="scroll"><table id="t-events"></table></div>
  </section>
  <section id="manual" class="section">
    <div class="card" style="margin-bottom:14px;">
      <div class="k">说明</div>
      <div style="font-size:13px; color:var(--muted); line-height:1.7;">
        以下操作<b style="color:var(--text)">不依赖守护进程</b>（面板独立连接 IB），自动流程出问题时可手动兜底。
        当前 <span id="m-mode" class="pill">…</span>，dry 模式下所有订单只记日志不真实发送。每次操作都会写事件日志并推送 Discord。
      </div>
    </div>
    <h3>流程步骤（哪步没跑就点哪步）</h3>
    <div class="filters" id="m-steps"></div>
    <h3>单仓位操作</h3>
    <div class="scroll"><table id="m-lots"></table></div>
    <h3 style="color:var(--red)">危险区</h3>
    <div class="filters">
      <button class="btn danger" id="m-cancel">撤销全部在途卖单</button>
      <button class="btn danger" id="m-flatten">一键清仓（全部市价卖出）</button>
    </div>
    <h3>操作结果</h3>
    <div class="card"><pre id="m-log" style="margin:0; font-size:12px; white-space:pre-wrap; max-height:200px; overflow:auto;">—</pre></div>
  </section>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const $ = s => document.querySelector(s);
const fmt$ = v => (v==null?'—':(v<0?'-':'')+'$'+Math.abs(Math.round(v)).toLocaleString());
const cls = v => v>0?'pos':(v<0?'neg':'');
const charts = {};
function chart(id, cfg){ if(charts[id]) charts[id].destroy(); charts[id]=new Chart($(id.startsWith('#')?id:'#'+id), cfg); }
function table(el, rows, cols) {
  if (!rows.length) { el.innerHTML = '<tr><td style="color:var(--muted)">暂无数据</td></tr>'; return; }
  el.innerHTML = '<tr>'+cols.map(c=>'<th>'+c[1]+'</th>').join('')+'</tr>' +
    rows.map(r=>'<tr>'+cols.map(c=>{
      let v = r[c[0]];
      if (c[2]==='$') return `<td class="${cls(v)}">${fmt$(v)}</td>`;
      if (c[2]==='%') return `<td class="${cls(v)}">${v==null?'—':v.toFixed(2)+'%'}</td>`;
      return '<td>'+(v==null?'—':v)+'</td>';
    }).join('')+'</tr>').join('');
}
async function j(u, opt){ return (await fetch(u, opt)).json(); }
async function safeJ(u, opt){ try { const r = await fetch(u, opt); if (!r.ok) throw 0; return await r.json(); } catch(e){ return null; } }
const stale = d => (d && d.stale) ? ` <span style="color:var(--amber);font-size:11px">(缓存${d.as_of?(' @ '+d.as_of.replace('T',' ')):''})</span>` : '';
let nextEvent = null;
setInterval(()=>{ if(!nextEvent) return;
  const dt = (new Date(nextEvent.when) - new Date())/1000;
  if (dt<0) { $('#countdown').textContent = nextEvent.name+' 执行中…'; return; }
  const h = Math.floor(dt/3600), m = Math.floor(dt%3600/60);
  $('#countdown').textContent = `下一动作 ${nextEvent.name} ${h}h${m}m`;
}, 1000);

async function header_(){
  const [o, g, ctl] = await Promise.all([safeJ('/api/overview'), safeJ('/api/gate/live'), safeJ('/api/control')]);
  if (o){
    $('#mode').textContent = 'mode: '+o.mode;
    $('#mode').className = 'pill '+(o.mode==='live'?'ok':'warn');
    $('#gw').textContent = o.gateway_ok?'网关正常':'网关无响应';
    $('#gw').className = 'pill '+(o.gateway_ok?'ok':'bad');
    $('#clock').textContent = o.now_et;
    const todayEt = o.now_et.split(' ')[0];
    $('#banner').style.display = (o.target_day!==todayEt)?'block':'none';
    $('#banner').textContent = '今日休市 · 下一交易日 '+o.target_day+' · 数据为最后一个交易日的状态';
  } else {
    $('#gw').textContent = '后端不可用'; $('#gw').className = 'pill bad';
  }
  if (g && g.passed!=null){
    $('#gatepill').innerHTML = (g.passed?'闸门放行':'闸门拦截')+
      ` VIX ${g.vix!=null?g.vix.toFixed(1):'?'} SPY ${g.spy_pct!=null?g.spy_pct.toFixed(2):'?'}%`+stale(g);
    $('#gatepill').className = 'pill '+(g.passed?'ok':'warn');
  } else {
    $('#gatepill').textContent = '闸门: 数据不可用'; $('#gatepill').className = 'pill bad';
  }
  const paused = ctl && ctl.pause_buys && ctl.pause_buys.value==='1';
  $('#pauseBtn').textContent = paused?'▶ 恢复开仓':'⏸ 暂停开仓';
  $('#pauseBtn').className = 'btn '+(paused?'safe':'danger');
  $('#pauseBtn').onclick = async ()=>{
    if (!confirm(paused?'恢复自动开仓？':'暂停自动开仓？(卖出链不受影响)')) return;
    await safeJ('/api/control/pause_buys/'+(paused?0:1), {method:'POST'}); header_();
  };
  return o;
}
async function loadOverview(){
  const o = await header_();
  const [qt, snaps] = await Promise.all([safeJ('/api/quotes'), safeJ('/api/snapshots')]);
  if (!o){ $('#ov-cards').innerHTML = '<div class="card"><div class="k">后端不可用</div><div class="v">—</div></div>'; return; }
  const s = o.snapshot||{}, r = o.last_run||{};
  const unreal = qt?qt.unrealized:null;
  $('#ov-cards').innerHTML = [
    ['净值', s.netliq!=null?fmt$(s.netliq):'—', '快照 '+(s.date||'—')],
    ['持仓市值', s.gross!=null?fmt$(s.gross):'—', (o.open_lots.length)+' 个 lot'],
    ['浮动盈亏(延迟)', `<span class="${cls(unreal)}">${fmt$(unreal)}</span>`, qt&&qt.stale?('缓存 @ '+(qt.as_of||'')):''],
    ['可用资金', s.available!=null?fmt$(s.available):'—', ''],
    ['最近闸门', r.date?(r.gate_pass?'放行':'拦截'):'—', r.date||''],
    ['闸门规则', 'VIX≥'+o.gate_cfg.vix_min+' 或 SPY≤'+o.gate_cfg.spy_max_pct+'%', ''],
  ].map(c=>`<div class="card"><div class="k">${c[0]}</div><div class="v">${c[1]}</div><div class="s">${c[2]}</div></div>`).join('');
  table($('#ov-lots'), qt&&qt.quotes?qt.quotes:o.open_lots, qt&&qt.quotes?
    [['symbol','代码'],['qty','数量'],['entry_price','成本'],['last','现价'],['pct','浮动','%'],['unrealized','盈亏','$'],['target_price','目标']]:
    [['symbol','代码'],['qty','数量'],['entry_price','成本'],['target_price','目标'],['state','状态']]);
  $('#ov-day').textContent = '('+o.target_day+')';
  table($('#ov-sched'), o.schedule, [['ts','时间 (ET)'],['name','动作']]);
  if (o.schedule.length){
    const now = new Date(o.now_et.replace(' ET','').replace(' ','T'));
    for (const ev of o.schedule){
      const [md, hm] = ev.ts.replace(' ET','').split(' ');
      const when = new Date(now.getFullYear()+'-'+md.replace('-','-')+'T'+hm+':00');
      if (when > now){ nextEvent = {name:ev.name, when}; break; }
    }
  }
  if (snaps && snaps.length){
    chart('eq-chart', {type:'line', data:{labels:snaps.map(x=>x.date),
      datasets:[{label:'NetLiq', data:snaps.map(x=>x.netliq), borderColor:'#4a90d9', borderWidth:2, pointRadius:2, tension:.2}]},
      options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'#8b95a3'}, grid:{display:false}},
                y:{ticks:{color:'#8b95a3', callback:v=>'$'+(v/1000)+'k'}, grid:{color:'#2a323d'}}}}});
  }
}
let lotFilter = '全部';
async function loadLots(){
  const [rows, sum, sh] = await Promise.all([j('/api/lots'), j('/api/lots/summary'), j('/api/shadow/summary')]);
  const s = sh.summary||{};
  $('#l-cards').innerHTML = [
    ['已平仓笔数', sum.n||0, ''], ['累计已实现', fmt$(sum.pnl), ''],
    ['胜率', sum.n?Math.round(100*sum.wins/sum.n)+'%':'—', ''],
    ['出场实验: 实际', s.n?fmt$(s.actual):'—', s.n?('同批 '+s.n+' 笔'):'积累数据中'],
    ['影子 T+1 收盘', s.n?fmt$(s.t1):'—', ''],
    ['影子 T+2 收盘', s.n?fmt$(s.t2):'—', ''],
  ].map(c=>`<div class="card"><div class="k">${c[0]}</div><div class="v">${c[1]}</div><div class="s">${c[2]||''}</div></div>`).join('');
  const states = ['全部', ...new Set(rows.map(r=>r.state))];
  $('#l-filters').innerHTML = states.map(s=>`<button class="btn ${s===lotFilter?'on':''}" data-f="${s}">${s}</button>`).join('');
  document.querySelectorAll('#l-filters .btn').forEach(b=>b.onclick=()=>{ lotFilter=b.dataset.f; loadLots(); });
  const view = lotFilter==='全部'?rows:rows.filter(r=>r.state===lotFilter);
  table($('#t-lots'), view, [['lot_id','ID'],['symbol','代码'],['entry_date','入场'],['qty','数量'],
    ['entry_price','成本'],['target_price','目标'],['state','状态'],
    ['exit_date','出场日'],['exit_price','出场价'],['exit_how','方式'],['pnl','盈亏','$']]);
}
async function loadHistory(){
  const sum = await j('/api/history/summary');
  $('#h-cards').innerHTML = sum.by_bucket.map(b=>
    `<div class="card"><div class="k">${b.bucket}（${b.n} 笔，胜率 ${b.win_rate}%）</div>
     <div class="v ${cls(b.pnl)}">${fmt$(b.pnl)}</div></div>`).join('')||'<div class="card">尚未导入历史</div>';
  if (sum.by_month.length){
    let cum=0; const cumd = sum.by_month.map(m=>({x:m.ym, y:(cum+=m.pnl)}));
    chart('h-chart', {type:'line', data:{datasets:[{label:'累计已实现', data:cumd, borderColor:'#4a90d9',
      borderWidth:2, pointRadius:2, tension:.2}]},
      options:{responsive:true, maintainAspectRatio:false, parsing:{xAxisKey:'x', yAxisKey:'y'},
      plugins:{legend:{labels:{color:'#8b95a3'}}},
      scales:{x:{type:'category', ticks:{color:'#8b95a3'}, grid:{color:'#2a323d'}},
              y:{ticks:{color:'#8b95a3', callback:v=>'$'+v}, grid:{color:'#2a323d'}}}}});
    chart('h-month', {type:'bar', data:{labels:sum.by_month.map(m=>m.ym),
      datasets:[{label:'月度盈亏', data:sum.by_month.map(m=>m.pnl),
        backgroundColor:sum.by_month.map(m=>m.pnl>=0?'#2fbf71':'#e05252'), borderRadius:3}]},
      options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#8b95a3'}}},
      scales:{x:{ticks:{color:'#8b95a3'}, grid:{display:false}},
              y:{ticks:{color:'#8b95a3', callback:v=>'$'+v}, grid:{color:'#2a323d'}}}}});
  }
  table($('#t-history'), await j('/api/history'), [['symbol','代码'],['entry_date','入场'],['last_date','出场'],
    ['hold_td','持有日'],['bucket','类别'],['pnl','盈亏','$']]);
}
async function loadRuns(){
  const rows = await j('/api/runs');
  rows.forEach(r=>r.gate_pass = r.gate_pass? '✅ 放行':'⛔ 拦截');
  table($('#t-runs'), rows, [['date','日期'],['gate_pass','闸门'],['vix','VIX'],['spy_pct','SPY%'],
    ['n_planned','计划数'],['budget','预算'],['note','备注']]);
}
async function loadEvents(){ table($('#t-events'), await j('/api/events'), [['ts','时间'],['kind','类型'],['detail','详情']]); }

const STEPS = {overnight_sells:'挂隔夜卖单', premarket_sells:'挂盘前卖单', open_trail:'改挂追踪单',
  confirm_fills:'成交确认', daily_report:'对账+日报', buy_flow:'闸门+买入流程'};
function mlog(s){ const el=$('#m-log'); el.textContent = new Date().toLocaleTimeString()+'  '+s+'\n'+el.textContent; }
async function act(url, name){
  mlog(name+' 执行中…');
  try { const r = await j(url, {method:'POST'});
    mlog(name+': '+(r.ok?('✅ '+r.result):('❌ '+r.error)));
  } catch(e){ mlog(name+': ❌ '+e); }
}
async function loadManual(){
  const o = await j('/api/overview');
  $('#m-mode').textContent = 'mode: '+o.mode;
  $('#m-mode').className = 'pill '+(o.mode==='live'?'ok':'warn');
  $('#m-steps').innerHTML = Object.entries(STEPS).map(([k,v])=>
    `<button class="btn" data-step="${k}">${v}</button>`).join('');
  document.querySelectorAll('#m-steps .btn').forEach(b=>b.onclick=()=>{
    if (confirm('手动执行「'+STEPS[b.dataset.step]+'」？')) act('/api/action/step/'+b.dataset.step, STEPS[b.dataset.step]);
  });
  const rows = o.open_lots;
  if (!rows.length){ $('#m-lots').innerHTML='<tr><td style="color:var(--muted)">无未平仓位</td></tr>'; }
  else {
    $('#m-lots').innerHTML = '<tr><th>lot</th><th>代码</th><th>数量</th><th>成本</th><th>目标</th><th>状态</th><th>操作</th></tr>'+
      rows.map(r=>`<tr><td>${r.lot_id}</td><td>${r.symbol}</td><td>${r.qty}</td><td>${r.entry_price}</td>
        <td>${r.target_price}</td><td>${r.state}</td><td style="display:flex;gap:4px;">
        <button class="btn" onclick="sellLot(${r.lot_id},'limit','${r.symbol}')">限价卖</button>
        <button class="btn" onclick="sellLot(${r.lot_id},'trail','${r.symbol}')">追踪卖</button>
        <button class="btn danger" onclick="sellLot(${r.lot_id},'market','${r.symbol}')">市价卖</button>
        <button class="btn" onclick="setTarget(${r.lot_id},${r.target_price})">改目标</button></td></tr>`).join('');
  }
  $('#m-cancel').onclick = ()=>{ if (confirm('撤销全部在途卖单？')) act('/api/action/cancel_all_sells','撤销全部卖单'); };
  $('#m-flatten').onclick = ()=>{
    const t = prompt('⚠️ 将对所有持仓提交市价卖出！输入 FLATTEN 确认:');
    if (t==='FLATTEN') act('/api/action/flatten_all','一键清仓');
  };
}
function sellLot(id, how, sym){
  const name = {limit:'限价卖',trail:'追踪卖',market:'市价卖'}[how]+' '+sym;
  if (confirm(name+'（lot '+id+'）？会先撤该票在途卖单')) act('/api/action/sell_lot/'+id+'/'+how, name);
}
function setTarget(id, cur){
  const p = prompt('新目标价 (当前 '+cur+'):');
  if (p && !isNaN(parseFloat(p))) act('/api/action/set_target/'+id+'/'+parseFloat(p), '改目标价 lot '+id);
}
const loaders = {overview:loadOverview, lots:loadLots, history:loadHistory, runs:loadRuns, events:loadEvents, manual:loadManual};
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); $('#'+b.dataset.s).classList.add('active');
  loaders[b.dataset.s]();
});
loadOverview();
setInterval(()=>{ const cur=document.querySelector('nav button.active').dataset.s; loaders[cur](); }, 60000);
</script>
</body>
</html>
